name: ci

on:
  push:
    branches: [master, main, development]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rust-toolchain.toml in the repo root pins the exact channel.
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      # Clippy runs without `-D warnings` during alpha so the existing
      # backlog doesn't block CI. Warnings still surface in the action
      # log; tighten this back to `-D warnings` once the backlog is
      # cleared.
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo doc
        run: cargo doc --workspace --no-deps
