name: ci

on:
  # Only `master` for push, not `development`. A commit landing on dev
  # already went through CI via its source PR (pull_request event), and
  # the open dev->master PR triggers a synchronize event for the same
  # commit, so a push trigger on dev would produce a third run for
  # work that's already been checked twice. Master push covers the
  # post-merge verification: the only way a commit reaches master is
  # via merging the dev->master PR, and we want CI green on master at
  # all times.
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rust-toolchain.toml in the repo root pins the exact channel.
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      # Clippy runs without `-D warnings` during alpha so the existing
      # backlog doesn't block CI. Warnings still surface in the action
      # log; tighten this back to `-D warnings` once the backlog is
      # cleared.
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo doc
        run: cargo doc --workspace --no-deps
