name: prepare-release

# Runs on every PR open / sync / reopen targeting master from
# development. Walks the commits in development that aren't on master,
# classifies them by their conventional-commit verb, computes the next
# version per the project's rules (patch is a monotonic global counter;
# `!` adds a minor; `!!` resets minor and bumps major), renders the
# changelog, commits the version bump to development (if any), and
# updates the PR description.
#
# The actual binary release runs from `release.yml` after the PR
# merges. This workflow's job is purely to prepare the dev branch +
# the PR body so the merge ships a coherent release.

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

# Only one prepare-release per PR at a time. Concurrent runs would
# race on the dev-branch push.
concurrency:
  group: prepare-release-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    # Only fire when the PR comes from `development`. Other branches
    # targeting master (hotfix branches, manual releases) skip this
    # auto-bump path; the maintainer handles those manually.
    if: github.event.pull_request.head.ref == 'development'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the dev branch directly so we can push the bump
          # commit back to it. `ref` here is the PR's head ref.
          ref: ${{ github.event.pull_request.head.ref }}
          # Need enough history that `master..development` resolves.
          # 0 = full history; the script's own `git fetch --depth=200`
          # would also work but full history is simpler in CI and the
          # repo is small.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for the bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute version + render changelog
        id: prep
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        # Invoked via `bash` explicitly rather than as an executable
        # since the +x bit doesn't always survive cross-platform
        # checkouts (Windows-on-WSL dev, Windows git client, etc).
        run: bash .github/scripts/prepare-release.sh

      - name: Commit version bump to development
        # Only fires when the script actually edited Cargo.toml (i.e.
        # bump != none). Skips for docs/ci/style-only batches.
        if: steps.prep.outputs.bump != 'none'
        run: |
          if git diff --quiet Cargo.toml; then
            echo "Cargo.toml unchanged; nothing to commit"
            exit 0
          fi
          # Also bump Cargo.lock so it stays in sync with the new
          # version. Rust toolchain is needed for `cargo metadata`.
          rustup show >/dev/null 2>&1 || true
          cargo update --workspace --offline 2>/dev/null || cargo update --workspace || true
          git add Cargo.toml Cargo.lock ".github/changelog/${{ steps.prep.outputs.new_version }}.md"
          git commit -m "chore(release): bump version to ${{ steps.prep.outputs.new_version }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Update PR description with rendered changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGELOG_PATH: ${{ steps.prep.outputs.changelog_path }}
          OLD_VERSION: ${{ steps.prep.outputs.old_version }}
          NEW_VERSION: ${{ steps.prep.outputs.new_version }}
          BUMP: ${{ steps.prep.outputs.bump }}
        run: |
          # Build the body with a sentinel comment so a future re-run
          # of this workflow can replace its own previous output rather
          # than appending forever. Anything between the markers gets
          # replaced; anything outside is preserved (lets the PR
          # author add their own notes above the auto-generated block).
          body_file=$(mktemp)
          existing=$(gh pr view "$PR_NUMBER" --json body --jq .body 2>/dev/null || echo "")

          # Strip the previous auto-block if present.
          if [[ -n "$existing" ]]; then
            printf '%s' "$existing" | awk '
              /<!-- crabby-release-bot:start -->/ { skipping=1; next }
              /<!-- crabby-release-bot:end -->/   { skipping=0; next }
              !skipping { print }
            ' > "$body_file"
            # Trim trailing blank lines so we don't accumulate them.
            sed -i -e :a -e '/^\s*$/{$d;N;ba' -e '}' "$body_file"
            echo "" >> "$body_file"
          fi

          {
            echo "<!-- crabby-release-bot:start -->"
            echo "<!-- This block is auto-generated by prepare-release.yml. Edits inside the markers will be overwritten on the next sync. -->"
            cat "$CHANGELOG_PATH"
            echo "<!-- crabby-release-bot:end -->"
          } >> "$body_file"

          gh pr edit "$PR_NUMBER" --body-file "$body_file"

      - name: Summary
        run: |
          echo "### Release preparation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Old version: ${{ steps.prep.outputs.old_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- New version: ${{ steps.prep.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bump: ${{ steps.prep.outputs.bump }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Rendered changelog:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.prep.outputs.changelog_path }}" >> "$GITHUB_STEP_SUMMARY"
