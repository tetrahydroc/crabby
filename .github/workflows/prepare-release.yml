name: prepare-release

# Runs on every push to `development`. Walks the commits on development
# that aren't yet on master, classifies them by conventional-commit
# verb, computes the next version (patch is a monotonic global counter;
# `!` adds a minor; `!!` resets minor and bumps major), renders the
# per-version changelog file, and commits the version bump back to
# development.
#
# The bump commit pushed here is itself a push to development, which
# re-fires this workflow AND fires `prerelease.yml`. The bot-commit
# subject guard below stops the loop here; `prerelease.yml` keys off
# the now-bumped Cargo.toml to build + tag `v<version>-rc.N`.
#
# Full (non-prerelease) builds happen later from `release.yml` once
# development merges into master; master inherits the version this
# workflow already bumped, so no recompute happens there.

on:
  push:
    branches: [development]

# One prepare-release per branch at a time. Concurrent runs would race
# on the dev-branch push.
concurrency:
  group: prepare-release-development
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      # Wire up the deploy key BEFORE checkout. The `development` branch
      # is protected by a "PRs only" ruleset; the only bypass actor is
      # the Deploy Key, so the bump push at the end of this job has to
      # come through SSH using that key. checkout@v4 with ssh-key
      # configures the repo's git remote to use SSH for both fetch and
      # push.
      - uses: actions/checkout@v4
        with:
          ref: development
          # Need enough history that `master..development` resolves.
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_BOT_SSH_KEY }}

      - name: Configure git committer identity
        run: |
          # Tag the bot commits with a recognizable identity. The
          # script (prepare-release.sh) skips commits matching this
          # subject shape when computing future bumps so the version-
          # bump commit doesn't double-count itself.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bail if HEAD is our own bump commit
        id: head_check
        # The workflow's own push to `development` triggers a fresh
        # `push` event, re-running this workflow. If HEAD is the bot's
        # `chore(release): bump version to X.Y.Z` commit, the previous
        # run already did the work; bail before doing anything else.
        # Belt-and-suspenders with the subject filter inside the script.
        run: |
          head_subject=$(git log -1 --format=%s HEAD)
          echo "HEAD subject: $head_subject"
          if [[ "$head_subject" =~ ^chore\(release\):[[:space:]]+bump\ version\ to\ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "HEAD is our own bump commit; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute version + render changelog
        if: steps.head_check.outputs.skip != 'true'
        id: prep
        env:
          # master is the comparison base: development commits not yet
          # on master are what the next release will ship.
          BASE_REF: master
          HEAD_REF: development
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        # Invoked via `bash` explicitly rather than as an executable
        # since the +x bit doesn't always survive cross-platform
        # checkouts (Windows-on-WSL dev, Windows git client, etc).
        run: bash .github/scripts/prepare-release.sh

      - name: Commit version bump to development
        # Only fires when the script actually edited Cargo.toml (i.e.
        # bump != none). Skips for docs/ci/style-only batches.
        if: steps.head_check.outputs.skip != 'true' && steps.prep.outputs.bump != 'none'
        run: |
          if git diff --quiet Cargo.toml; then
            echo "Cargo.toml unchanged; nothing to commit"
            exit 0
          fi
          # Also bump Cargo.lock so it stays in sync with the new
          # version. Rust toolchain is needed for `cargo metadata`.
          rustup show >/dev/null 2>&1 || true
          cargo update --workspace --offline 2>/dev/null || cargo update --workspace || true
          git add Cargo.toml Cargo.lock ".github/changelog/${{ steps.prep.outputs.new_version }}.md"
          git commit -m "chore(release): bump version to ${{ steps.prep.outputs.new_version }}"
          git push origin HEAD:development

      - name: Summary
        if: steps.head_check.outputs.skip != 'true'
        run: |
          echo "### Release preparation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Old version: ${{ steps.prep.outputs.old_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- New version: ${{ steps.prep.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bump: ${{ steps.prep.outputs.bump }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Rendered changelog:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.prep.outputs.changelog_path }}" >> "$GITHUB_STEP_SUMMARY"
