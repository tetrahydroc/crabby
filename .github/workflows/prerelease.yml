name: prerelease

# Builds + publishes a PRERELEASE on every version bump that lands on
# `development`.
#
# Flow: a feature PR merges into development -> `prepare-release.yml`
# computes the next version, bumps Cargo.toml, and pushes a
# `chore(release): bump version to X.Y.Z` commit. THAT push is what
# this workflow fires on (it gates on HEAD being the bump commit), so
# every dev-side version bump produces a downloadable prerelease build
# tagged `v<X.Y.Z>-rc.N`.
#
# `N` is derived by counting existing `v<X.Y.Z>-rc.*` tags: the first
# prerelease for a version is rc.1, the next rc.2, etc. After the
# version ships to master and `release.yml`'s sync resets development,
# the next cycle's first prerelease starts a fresh rc.1 for the new
# X.Y.Z (its rc tags don't exist yet).
#
# Full (non-prerelease) builds come from `release.yml` on master.

on:
  push:
    branches: [development]

env:
  CARGO_TERM_COLOR: always

# One prerelease at a time so concurrent bump pushes don't race on tag
# creation.
concurrency:
  group: prerelease-development
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  resolve-version:
    name: resolve prerelease version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
      tag: ${{ steps.derive.outputs.tag }}
      should_build: ${{ steps.derive.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive prerelease version + rc tag
        id: derive
        run: |
          # Only build when HEAD is the bot's version-bump commit. A
          # plain feature merge into development doesn't carry a new
          # version; `prepare-release.yml` turns it into a bump commit,
          # and the bump commit's push is what should release.
          head_subject=$(git log -1 --format=%s HEAD)
          echo "HEAD subject: $head_subject"
          if ! [[ "$head_subject" =~ ^chore\(release\):[[:space:]]+bump\ version\ to\ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "HEAD is not a version-bump commit; no prerelease to build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Cargo.toml's [workspace.package] version drives every crate.
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: workspace version '$version' is not X.Y.Z" >&2
            exit 1
          fi

          # rc counter: highest existing `v<version>-rc.<N>` tag + 1,
          # starting at 1 when none exist yet. `git tag --list` over a
          # full-history checkout sees every prior rc tag.
          git fetch --tags --quiet origin || true
          max_rc=0
          while read -r t; do
            [[ -z "$t" ]] && continue
            n="${t##*-rc.}"
            if [[ "$n" =~ ^[0-9]+$ ]] && (( n > max_rc )); then
              max_rc=$n
            fi
          done < <(git tag --list "v${version}-rc.*")
          rc=$(( max_rc + 1 ))
          tag="v${version}-rc.${rc}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "Resolved prerelease ${tag}"

  build:
    name: build (${{ matrix.os }})
    needs: resolve-version
    if: needs.resolve-version.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: crabby-linux-x86_64
            binary: crabby
            asset: crabby-linux-x86_64.tar.gz
          - os: windows-latest
            artifact-name: crabby-windows-x86_64
            binary: crabby.exe
            asset: crabby-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache from CI so release builds don't fight for
          # cache space with debug builds. Shared with `release.yml`'s
          # release-* keys since both produce `--release` binaries.
          key: release-${{ matrix.os }}

      - name: cargo build --release -p crabby-ui
        run: cargo build --release -p crabby-ui

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary }} dist/
          cp README.md dist/ 2>/dev/null || true
          cd dist
          tar -czf ../${{ matrix.asset }} *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/${{ matrix.binary }} dist/
          if (Test-Path README.md) { Copy-Item README.md dist/ }
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish prerelease
    needs: [resolve-version, build]
    if: needs.resolve-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build release body
        id: body
        run: |
          body_file="$(mktemp)"
          # Per-version changelog written by prepare-release.sh during
          # the bump that triggered this build. Same X.Y.Z as the rc
          # tag (the `-rc.N` suffix is build-instance, not version).
          notes_path=".github/changelog/${{ needs.resolve-version.outputs.version }}.md"
          if [[ -f "$notes_path" ]]; then
            cat "$notes_path" >> "$body_file"
            echo "" >> "$body_file"
            echo "---" >> "$body_file"
            echo "" >> "$body_file"
          else
            echo "## crabby ${{ needs.resolve-version.outputs.tag }}" >> "$body_file"
            echo "" >> "$body_file"
            echo "Prerelease built from \`development\` at commit ${{ github.sha }}." >> "$body_file"
            echo "" >> "$body_file"
          fi
          echo "> **Prerelease.** Built from \`development\`. The stable build of \`${{ needs.resolve-version.outputs.version }}\` ships from \`master\`." >> "$body_file"
          echo "" >> "$body_file"
          echo "## Downloads" >> "$body_file"
          echo "" >> "$body_file"
          echo "- **Windows**: \`crabby-windows-x86_64.zip\`" >> "$body_file"
          echo "- **Linux**: \`crabby-linux-x86_64.tar.gz\`" >> "$body_file"
          echo "" >> "$body_file"
          echo "See [README](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/README.md) for install steps." >> "$body_file"
          echo "body_file=${body_file}" >> "$GITHUB_OUTPUT"

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: ${{ needs.resolve-version.outputs.tag }}
          body_path: ${{ steps.body.outputs.body_file }}
          target_commitish: development
          files: |
            artifacts/crabby-linux-x86_64/crabby-linux-x86_64.tar.gz
            artifacts/crabby-windows-x86_64/crabby-windows-x86_64.zip
          draft: false
          prerelease: true
          fail_on_unmatched_files: true

  noop:
    name: skip prerelease (not a version bump)
    needs: resolve-version
    if: needs.resolve-version.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log skip
        run: |
          echo "HEAD on \`development\` is not a \`chore(release): bump version\` commit; nothing to prerelease." >> "$GITHUB_STEP_SUMMARY"
          echo "Feature merges into development trigger \`prepare-release.yml\`, which produces the bump commit; the bump commit's push is what builds a prerelease." >> "$GITHUB_STEP_SUMMARY"
